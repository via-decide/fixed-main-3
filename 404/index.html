<html>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      (function () {
        try {
          sessionStorage.setItem("__vd_redirect__", location.pathname + location.search + location.hash);
        } catch (e) {}
        location.replace("/");
      })();
    </script>
  </head>

<main id="app">

</main>
</body>
