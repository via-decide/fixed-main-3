
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Founder • Weekly Decision Reviews</title>

  <style>
    /* ============================================================
       GLOBAL UX PATCH — tap highlight, selection, focus
       ============================================================ */
    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* Remove focus outline for pointer/mouse interactions only;
       keyboard users (:focus-visible) still get a ring */
    *:focus:not(:focus-visible) {
      outline: none !important;
      box-shadow: none !important;
    }

    /* Suppress text selection globally */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Re-enable selection for interactive / code elements */
    input,
    textarea,
    [contenteditable="true"],
    pre,
    code,
    .allow-select {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
    }

    /* Neutral selection colour where selection is allowed */
    ::selection        { background: rgba(255,103,31,0.32); color: #fff; }
    ::-moz-selection   { background: rgba(255,103,31,0.32); color: #fff; }
    /* ============================================================ */

    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent: #ff671f;
      --accent-glow: rgba(255, 103, 31, 0.16);
      --accent2: #22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);

      --maxw: 860px;
    }

    html, body {
      height: 100%; height: 100dvh; margin: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

    .bg-glow {
      position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 90% 100%, rgba(255,255,255,0.04), transparent 60%);
    }

    .top {
      position:absolute; top:0; left:0; right:0; z-index:50;
      padding: calc(14px + var(--safeTop)) calc(14px + var(--safeRight)) 12px calc(14px + var(--safeLeft));
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(5,5,5,0.96) 0%, rgba(5,5,5,0) 100%);
    }
    .top > * { pointer-events:auto; }

    .back, .pill, .btn-icon {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 10px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.66);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      user-select:none;
    }
    .back { font-weight:700; font-size:13px; color:rgba(255,255,255,0.92); }
    .back:active { transform: scale(0.97); }
    .btn-icon { width:40px; height:40px; padding:10px; color:var(--accent); font-weight:900; }
    .btn-icon:active { transform: scale(0.97); }
    .pill { font-size:11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    .pill b { color:#fff; font-weight:900; letter-spacing: .1em; }

    .scroll-container{
      position:absolute; inset:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start;
      scroll-snap-stop: always;
      display:flex; align-items:center; justify-content:center;
      padding: calc(88px + var(--safeTop)) calc(14px + var(--safeRight)) calc(96px + var(--safeBottom)) calc(14px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%; max-width: var(--maxw);
      height:100%;
      border-radius: var(--radius);
      border:1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      display:flex; flex-direction:column;
      overflow:hidden;
      opacity:.35; transform: scale(.94) translateY(26px);
      transition: opacity .7s cubic-bezier(0.16,1,0.3,1), transform .7s cubic-bezier(0.16,1,0.3,1);
      min-height:0;
    }
    .section-wrapper.is-active .card{ opacity:1; transform: scale(1) translateY(0); }

    .cardHeader{
      padding: 22px 22px 18px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.28);
      flex-shrink:0;
    }
    .kicker{
      font-size:11px; letter-spacing:.15em; text-transform:uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight:900;
    }
    .h1{
      margin:0;
      font-size: clamp(22px, 4.8vw, 30px);
      line-height:1.25;
      letter-spacing:-0.01em;
      font-weight:900;
    }

    .cardBody{
      padding: 22px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      flex:1; min-height:0;
    }
    .cardBody::-webkit-scrollbar { width: 5px; }
    .cardBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    .big{
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.08;
      font-weight: 950;
      letter-spacing:-0.03em;
      margin: 0 0 18px;
    }
    .accentText{
      background: linear-gradient(135deg, #ff8a4c, #ff4c00);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      color: var(--accent);
    }
    .lead{ font-size:17px; line-height:1.65; color: rgba(255,255,255,0.86); margin: 0 0 14px; }
    .muted{ color: var(--text-muted); }
    .list{ margin:18px 0; padding:0; list-style:none; color: rgba(255,255,255,0.78); font-size:16px; line-height:1.6; }
    .list li{ position:relative; padding-left:24px; margin: 12px 0; }
    .list li::before{ content:"→"; position:absolute; left:0; color: var(--accent); font-weight:900; }
    .quote{
      margin: 22px 0 16px;
      padding: 14px 18px;
      border-left: 3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius: 0 12px 12px 0;
      color: rgba(255,255,255,0.95);
      line-height:1.6;
      font-size:15px;
      font-style: italic;
    }

    .ctaBox{
      margin: 18px 0;
      border-radius: 18px;
      border: 1px solid rgba(255,103,31,0.24);
      background: linear-gradient(180deg, rgba(255,103,31,0.10), rgba(0,0,0,0.10));
      padding: 16px;
    }
    .ctaHead{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    }
    .ctaHead strong{
      display:block;
      font-size: 15px;
      letter-spacing: .02em;
    }
    .ctaHead span{
      display:block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .ctaRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top: 14px;
    }
    @media (max-width:520px){ .ctaRow{ grid-template-columns: 1fr; } }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:100%;
      padding: 14px 14px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: .02em;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.28);
      transition: transform .18s ease, filter .18s ease, border-color .18s ease;
      user-select:none;
      cursor: pointer;
    }
    /* Keyboard focus ring for buttons */
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn:active{ transform: scale(0.985); filter: brightness(1.08); }
    .btnPrimary{
      background: linear-gradient(135deg, rgba(255,103,31,0.98), rgba(255,103,31,0.60));
      border-color: rgba(255,103,31,0.34);
      color:#0b0b0b;
    }
    .btnGhost{
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
      color:#fff;
    }
    .btnOk{
      background: rgba(34,197,94,0.92);
      border-color: rgba(34,197,94,0.35);
      color:#08130c;
      font-weight:950;
    }

    .field{
      display:flex; flex-direction:column; gap:8px; margin-top: 12px;
    }
    .field label{
      font-size: 12px; text-transform: uppercase; letter-spacing: .12em;
      color: var(--text-muted); font-weight: 800;
    }
    .field input{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 14px;
      color:#fff;
      font-size: 15px;
      outline:none;
      /* Explicitly re-enable selection & callout for inputs */
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }
    .field input:focus{
      border-color: rgba(255,103,31,0.55);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .stickyCTA{
      position: fixed;
      left: calc(12px + var(--safeLeft));
      right: calc(12px + var(--safeRight));
      bottom: calc(12px + var(--safeBottom));
      z-index: 60;
      max-width: var(--maxw);
      margin: 0 auto;
      display:flex;
      gap:10px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    }
    .stickyCTA .left{
      flex:1;
      min-width:0;
      display:flex; flex-direction:column; gap:2px;
      padding: 4px 6px 4px 8px;
    }
    .stickyCTA .left b{
      font-size: 13px; letter-spacing: .01em;
    }
    .stickyCTA .left span{
      font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
    }
    .stickyCTA .right{ width: 220px; }
    @media (max-width:520px){
      .stickyCTA{ flex-direction:column; }
      .stickyCTA .right{ width:100%; }
      .stickyCTA .left span{ white-space:normal; }
    }

    .hint{
      position:absolute;
      bottom: calc(14px + var(--safeBottom));
      left: 50%;
      transform: translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      pointer-events:none;
      animation: pulse 2s infinite;
      z-index: 100;
    }
    .hint svg{ width:14px; height:14px; stroke: currentColor; fill:none; stroke-width: 2.5; }
    @keyframes pulse{
      0%,100%{ transform: translateX(-50%) translateY(0); opacity:.55; }
      50%{ transform: translateX(-50%) translateY(6px); opacity:1; }
    }
    .section-wrapper:last-child .hint{ display:none; }

    /* Clickable-card keyboard focus */
    [role="button"]:focus-visible,
    [role="link"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
  </style>
</head>

<body>
<main id="app">
<div class="bg-glow"></div>

  <div class="top">
    <a class="back" href="index.html" id="btnBack">← Back</a>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-icon" id="btnTranslate" title="Translate">A/अ</button>
      <div class="pill"><b id="secLabel">SEC 1/7</b> • <span id="secName">INTRO</span></div>
    </div>
  </div>

  <main class="scroll-container" id="scrollContainer"></main>

  <!-- Sticky mega CTA -->
  <div class="stickyCTA" role="region" aria-label="Primary call to action">
    <div class="left">
      <b>Block 30 minutes this Friday. Review 3 decisions.</b>
      <span>One session builds more clarity than a month of reaction.</span>
    </div>
    <div class="right">
      <button class="btn btnPrimary" id="ctaStart">See the Exact Format →</button>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      /* ── iOS Safari tap-highlight safety patch ──────────────────
         Prevents any residual blue flash on touchstart without
         blocking scroll, click, or any default behaviour.          */
      document.addEventListener("touchstart", function(){}, { passive: true });

      /* ── Keyboard support for div[role=button/link] ─────────────
         Applied after render() via event delegation so it covers
         dynamically injected cards too.                            */
      document.addEventListener("keydown", function(e){
        if (e.key !== "Enter" && e.key !== " ") return;
        const el = e.target;
        const role = el.getAttribute("role");
        if (role === "button" || role === "link") {
          e.preventDefault();
          el.click();
        }
      });

      document.getElementById("btnBack").addEventListener("click", function(e){
        e.preventDefault();
        if (history.length > 1) history.back();
        else location.href = "index.html";
      });

      const WA_NUMBER = "916351537770";
      const container = document.getElementById("scrollContainer");
      const secLabel = document.getElementById("secLabel");
      const secName = document.getElementById("secName");
      const btnTranslate = document.getElementById("btnTranslate");
      const ctaStart = document.getElementById("ctaStart");

      let lang = "en";

      const BLOG = {
        title: {
          en: "The Founder's Weekly Decision Review",
          hi: "संस्थापक की साप्ताहिक निर्णय समीक्षा"
        },
        sections: [
          {
            name:"INTRO",
            kicker:{en:"Founder Practice", hi:"संस्थापक का अभ्यास"},
            title:{en:"The 30-minute ritual that compounds your judgment", hi:"30 मिनट का रिवाज जो निर्णय क्षमता बढ़ाता है"},
            html:{
              en: () => `
                <div class="big">Your competitors review <span class="accentText">results.</span><br>You review <span class="accentText">decisions.</span></div>
                <p class="lead">Results tell you what happened. Decisions tell you why — and whether your reasoning is getting sharper or just getting lucky. This weekly ritual closes that gap.</p>
                <div class="ctaBox">
                  <div class="ctaHead">
                    <div>
                      <strong>⚡ One rule:</strong>
                      <span>Pick 3–5 decisions from the past week. Audit the reasoning — not the outcome. Do it before Monday starts.</span>
                    </div>
                  </div>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="jumpTo('FORMAT')">See the 30-minute format →</button>
                    <button class="btn btnGhost" onclick="sendWA('I want to start the Weekly Decision Review. Share the format and log template.')">Get the template on WhatsApp</button>
                  </div>
                </div>
                <div class="quote">"The goal isn't to get every decision right. It's to get better at deciding — so the odds compound in your favour."</div>
              `,
              hi: () => `
                <div class="big">आपके प्रतिस्पर्धी <span class="accentText">परिणाम</span> देखते हैं।<br>आप <span class="accentText">निर्णय</span> देखते हैं।</div>
                <p class="lead">परिणाम बताता है क्या हुआ। निर्णय बताता है क्यों — और आपकी सोच तेज हो रही है या बस किस्मत अच्छी थी। यह साप्ताहिक रिवाज वह फ़र्क बंद करता है।</p>
                <div class="ctaBox">
                  <div class="ctaHead">
                    <div>
                      <strong>⚡ एक नियम:</strong>
                      <span>पिछले हफ्ते के 3–5 निर्णय चुनें। तर्क की जाँच करें — परिणाम की नहीं। सोमवार से पहले करें।</span>
                    </div>
                  </div>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="jumpTo('FORMAT')">30-मिनट फॉर्मेट देखें →</button>
                    <button class="btn btnGhost" onclick="sendWA('मुझे Weekly Decision Review शुरू करनी है। फॉर्मेट और लॉग टेम्पलेट भेजें।')">WhatsApp पर टेम्पलेट लें</button>
                  </div>
                </div>
                <div class="quote">"लक्ष्य हर निर्णय सही होना नहीं। लक्ष्य है — निर्णय लेने में बेहतर होना, ताकि odds हमेशा आपके पक्ष में compounding करें।"</div>
              `
            }
          },
          {
            name:"WHY",
            kicker:{en:"The Real Problem", hi:"असली समस्या"},
            title:{en:"Outcome reviews teach you nothing about judgment", hi:"परिणाम-रिव्यू निर्णय क्षमता नहीं सिखाते"},
            html:{
              en: () => `
                <div class="big">Outcome bias is <span class="accentText">silent</span> and expensive.</div>
                <p class="lead">A good decision can produce a bad outcome. A bad decision can get lucky. If you only review outcomes, you can't tell the difference — so you either punish good thinking or reward bad bets.</p>
                <ul class="list">
                  <li><b>No reasoning audit</b> → the same flawed assumption fires again next month.</li>
                  <li><b>No assumptions named</b> → decisions feel like consensus but carry hidden bets.</li>
                  <li><b>No written log</b> → the team forgets what it learned and re-learns it expensively.</li>
                  <li><b>Only outcome tracking</b> → the team learns to look busy after things go wrong, not to think better before.</li>
                </ul>
                <div class="quote">Most post-mortems are autopsies. A decision review is a training programme.</div>
              `,
              hi: () => `
                <div class="big">Outcome bias <span class="accentText">चुपचाप</span> और महंगा होता है।</div>
                <p class="lead">अच्छा निर्णय बुरा परिणाम दे सकता है। बुरा निर्णय किस्मत से बच सकता है। अगर आप सिर्फ परिणाम देखते हैं, तो फर्क नहीं समझ पाएंगे — और अच्छी सोच को दंड देंगे या बुरी सोच को इनाम।</p>
                <ul class="list">
                  <li><b>तर्क की जाँच नहीं</b> → वही गलत अनुमान अगले महीने फिर से चलेगा।</li>
                  <li><b>अनुमान लिखे नहीं</b> → निर्णय consensus लगता है, लेकिन छुपे हुए जोखिम होते हैं।</li>
                  <li><b>लिखित लॉग नहीं</b> → टीम सीख भूल जाती है और महंगे तरीके से दोबारा सीखती है।</li>
                  <li><b>केवल परिणाम tracking</b> → टीम गड़बड़ी के बाद व्यस्त दिखना सीखती है, पहले बेहतर सोचना नहीं।</li>
                </ul>
                <div class="quote">अधिकांश post-mortems शव-परीक्षाएं हैं। Decision review एक training programme है।</div>
              `
            }
          },
          {
            name:"MINDSET",
            kicker:{en:"The Founder Shift", hi:"संस्थापक बदलाव"},
            title:{en:"Stop managing tasks. Start designing how you decide.", hi:"काम संभालना बंद करें। निर्णय प्रक्रिया बनाना शुरू करें।"},
            html:{
              en: () => `
                <div class="big">The weekly question that changes everything:</div>
                <ul class="list">
                  <li><b>Operator asks:</b> "What should we do about this?"</li>
                  <li><b>Founder asks:</b> "What made us decide this way — and was that reasoning sound?"</li>
                </ul>
                <p class="lead">When the team knows decisions will be reviewed, three things shift: people document their reasoning before acting, assumptions get stated out loud, and gut calls get challenged respectfully.</p>
                <div class="ctaBox">
                  <strong>✅ Ground rule for every review:</strong>
                  <span style="display:block; margin-top:6px; color:var(--text-muted); font-size:14px; line-height:1.55;">We audit the <b>decision</b>, not the person who made it. No blame. No hindsight superiority. Only: "What can we extract to decide better next time?"</span>
                </div>
                <div class="quote">Psychological safety inside the review room is what makes honest reasoning possible outside it.</div>
              `,
              hi: () => `
                <div class="big">वह साप्ताहिक सवाल जो सब बदल देता है:</div>
                <ul class="list">
                  <li><b>ऑपरेटर पूछता है:</b> "इस बारे में क्या करें?"</li>
                  <li><b>संस्थापक पूछता है:</b> "हमने इस तरह क्यों decide किया — और क्या वह तर्क सही था?"</li>
                </ul>

            e.target.classList.remove("is-active");
          }
        });

`Decision:
