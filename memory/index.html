<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Decision Memory • The Cheapest AI Upgrade</title>

  <!-- ✅ Universal Router (hash + path) -->
  <script src="/router.js"></script>

  <style>
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent: #ff671f;
      --accent-glow: rgba(255, 103, 31, 0.15);
      --accent2: #22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);

      --maxw: 760px;
    }

    html, body {
      height: 100%; height: 100dvh; margin: 0; background-color: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; overscroll-behavior-y: none; -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

    #appWrapper { position: relative; width: 100vw; height: 100dvh; transform-origin: center center; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); overflow: hidden; }
    #appWrapper.forced-landscape { width: 100dvh; height: 100vw; position: absolute; top: 50%; left: 50%; margin-top: -50vw; margin-left: -50dvh; }

    .bg-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%); z-index: 0; }

    .top {
      position: absolute; top: 0; left: 0; right: 0;
      padding: calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index: 50; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      pointer-events: none; background: linear-gradient(180deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0) 100%);
    }
    .top > * { pointer-events: auto; }
    .top-actions { display: flex; align-items: center; gap: 8px; }

    .back, .pill, .btn-icon {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .btn-icon { padding: 10px; font-weight: 700; color: var(--accent); width: 38px; height: 38px; }
    .btn-icon:active, .back:active { transform: scale(0.96); }
    .back { color: rgba(255,255,255,0.9); font-weight: 600; font-size: 14px; text-decoration: none;}
    .pill { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    .pill b { color: #fff; letter-spacing: 0.1em; font-weight: 700; }

    .scroll-container {
      position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
      scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; z-index: 10;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .section-wrapper {
      height: 100%; width: 100%; scroll-snap-align: start; scroll-snap-stop: always;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(60px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position: relative;
    }
    .card {
      width: 100%; max-width: var(--maxw); flex: 1; min-height: 0;
      border-radius: var(--radius); border: 1px solid var(--card-border);
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden;
      opacity: 0.3; transform: scale(0.92) translateY(30px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .section-wrapper.is-active .card { opacity: 1; transform: scale(1) translateY(0); }

    .cardHeader { padding: 24px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.3); flex-shrink: 0; }
    .kicker { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
    .h1 { margin: 0; font-size: clamp(22px, 5vw, 28px); line-height: 1.3; letter-spacing: -0.01em; font-weight: 700; }

    .cardBody { padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
    .cardBody::-webkit-scrollbar { width: 5px; }
    .cardBody::-webkit-scrollbar-track { background: transparent; }
    .cardBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    .big { font-size: clamp(28px, 6vw, 42px); line-height: 1.15; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 24px; }
    .big .accent { background: linear-gradient(135deg, #ff8a4c, #ff4c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--accent); }
    .lead { font-size: 17px; line-height: 1.6; color: rgba(255,255,255,0.85); margin: 0 0 16px; }
    .list { margin: 20px 0; padding: 0; list-style: none; color: rgba(255,255,255,0.75); font-size: 16px; line-height: 1.6; }
    .list li { position: relative; padding-left: 24px; margin: 14px 0; }
    .list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: bold; }
    .list b { color: #fff; }
    .quote { margin: 28px 0 20px; padding: 16px 20px; border-left: 3px solid var(--accent); background: linear-gradient(90deg, var(--accent-glow), transparent); border-radius: 0 12px 12px 0; color: rgba(255,255,255,0.95); line-height: 1.6; font-size: 15px; font-style: italic; }

    .auth-protocol {
      background: rgba(255,103,31,0.06); border: 1px dashed rgba(255,103,31,0.3);
      padding: 16px; border-radius: 12px; margin-bottom: 24px; font-size: 13px; line-height: 1.6; color: var(--text-muted);
    }
    .auth-protocol b { color: var(--text); }
    .auth-protocol .step { color: var(--accent); font-weight: 700; margin-right: 4px; }

    .onboard-form { display: flex; flex-direction: column; gap: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }

    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; }

    .input-group input, .input-group textarea, .input-group select {
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 14px 16px; color: #fff; font-family: inherit; font-size: 15px; outline: none; transition: all 0.2s; appearance: none;
    }
    .input-group textarea { resize: vertical; min-height: 80px; }
    .input-group input::placeholder, .input-group textarea::placeholder { color: rgba(255,255,255,0.3); }
    .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 3px var(--accent-glow); }

    .select-wrapper { position: relative; }
    .select-wrapper::after { content: "▼"; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 10px; color: rgba(255,255,255,0.4); pointer-events: none; }

    .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .check-pill input { display: none; }
    .check-pill span {
      display: inline-flex; padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3); font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .check-pill input:checked + span { background: var(--accent-glow); border-color: var(--accent); color: #fff; font-weight: 600; }

    .btn-submit, .btn-secondary, .btn-success {
      border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: transform 0.2s, filter 0.2s;
      display: flex; justify-content: center; align-items: center; gap: 8px;
      width: 100%;
      text-decoration: none;
    }
    .btn-submit { background: var(--accent); color: #fff; margin-top: 8px; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; margin-top: 8px; border: 1px solid rgba(255,255,255,0.15); }
    .btn-success { background: var(--accent2); color: #000; margin-top: 16px; }
    .btn-submit:active, .btn-secondary:active, .btn-success:active { transform: scale(0.98); filter: brightness(1.1); }

    .verify-box { background: rgba(0,0,0,0.6); border: 1px solid var(--accent); padding: 20px; border-radius: 12px; margin-top: 16px; text-align: center; }
    .verify-box p { font-size: 14px; color: var(--text-muted); margin: 0 0 16px; line-height: 1.5; }
    .mono-preview { background: rgba(5, 5, 5, 0.8); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; margin-top: 16px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; color: #cbd5e1; white-space: pre-wrap; word-break: break-word; line-height: 1.5; display: none; }

    .success-state { text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .success-state h2 { margin: 0 0 10px; font-size: 24px; color: #fff; }
    .success-state p { color: var(--text-muted); line-height: 1.6; font-size: 15px; }

    .hint { position: absolute; bottom: calc(16px + var(--safeBottom)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; pointer-events: none; animation: pulse 2s infinite; }
    .hint svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    @keyframes pulse { 0%, 100% { transform: translate(-50%, 0); opacity: 0.6; } 50% { transform: translate(-50%, 5px); opacity: 1; } }
    .section-wrapper:last-child .hint { display: none; }

    .rotate-popup { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) scale(0.9); background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 30px rgba(255, 103, 31, 0.4); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999; cursor: pointer; }
    .rotate-popup.is-visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
    .rotate-popup:active { transform: translateX(-50%) scale(0.95); }

    .translate-toast { position: fixed; top: calc(80px + var(--safeTop)); left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(20, 20, 22, 0.95); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: #fff; padding: 10px 16px 10px 20px; border-radius: 999px; font-size: 14px; display: flex; align-items: center; gap: 16px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999; }
    .translate-toast.is-visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .btn-undo { color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em; padding: 6px 12px; background: rgba(255, 103, 31, 0.15); border-radius: 999px; }
    .btn-undo:active { background: rgba(255, 103, 31, 0.25); }
  </style>
</head>

<body>
<main id="app">
<div id="appWrapper">
    <div class="bg-glow"></div>

    <div class="top">
      <!-- ✅ Router back -->
      <a class="back" href="#" data-back>← Back</a>

      <div class="top-actions">
        <button id="btnLogout" class="btn-icon" aria-label="Logout" title="End Session" style="display:none;" onclick="logoutSession()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate" title="Translate to Hindi">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/9</b> • <span id="secName">HOOK</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
    (function(){
      "use strict";

      let authState = {
        role: localStorage.getItem('VIA_ROLE') || null,
        email: localStorage.getItem('VIA_USER') || null,
        pendingVerification: false,
        pendingRole: null,
        pendingEmail: null
      };

      const WA_NUMBER = "916351537770";

      function generateExpectedCode(email) {
        const raw = email.trim().toLowerCase() + "_VIACO2026";
        const b64 = btoa(raw).replace(/[^a-zA-Z0-9]/g, '').substring(0, 5).toUpperCase();
        return "VIA-" + b64;
      }

      const SECTIONS = [
        {
          name: "HOOK", kicker: "The Pre-Requisite",
          title: { en: "The Pre-Requisite to AI", hi: "AI की पूर्व-शर्त" },
          html: {
            en: () => `<div class="big">Everyone wants <span class="accent">AI.</span></div>
                       <p class="lead">Forecasting AI. Pricing AI. Marketing AI. Hiring AI.</p>
                       <p class="lead">But here’s something almost no small or mid-sized business has: <b>A record of why decisions were made.</b></p>
                       <p class="lead">Not revenue logs. Not transaction history. Actual decision memory.</p>
                       <div class="quote">Before you buy intelligence… you need memory. That’s where decision logs come in. And they might be the cheapest "AI" upgrade your business will ever implement.</div>`,
            hi: () => `<div class="big">हर कोई <span class="accent">AI</span> चाहता है।</div>
                       <p class="lead">पूर्वानुमान AI. मूल्य निर्धारण AI. मार्केटिंग AI. हायरिंग AI.</p>
                       <p class="lead">लेकिन यहाँ कुछ ऐसा है जो लगभग किसी भी छोटे या मध्यम आकार के व्यवसाय के पास नहीं है: <b>निर्णय क्यों लिए गए, इसका रिकॉर्ड।</b></p>
                       <p class="lead">राजस्व लॉग नहीं। लेनदेन का इतिहास नहीं। वास्तविक निर्णय स्मृति (Decision Memory)।</p>
                       <div class="quote">इंटेलिजेंस खरीदने से पहले... आपको मेमोरी की आवश्यकता है। यहीं पर निर्णय लॉग काम आते हैं। और वे संभवतः सबसे सस्ता "AI" अपग्रेड हो सकते हैं जो आपका व्यवसाय कभी लागू करेगा।</div>`
          }
        },
        {
          name: "DEFINITION", kicker: "Decision Memory",
          title: { en: "What Is a Decision Log?", hi: "निर्णय लॉग (Decision Log) क्या है?" },
          html: {
            en: () => `<div class="big">A structured record of <span class="accent">reasoning.</span></div>
                       <p class="lead">A decision log is exactly what it sounds like. A simple format detailing the decision, reasoning, expected outcome, date, and actual result.</p>
                       <p class="lead">Most founders believe they’ll remember why something was done. <b>They won’t.</b> Three months later, the context is gone.</p>
                       <ul class="list">
                         <li>A discount was offered. Why?</li>
                         <li>A supplier was changed. Why?</li>
                         <li>A product was discontinued. Why?</li>
                       </ul>
                       <div class="quote">Without logic, you can’t improve. Instead, you repeat. That’s the trap.</div>`,
            hi: () => `<div class="big"><span class="accent">तर्क (Reasoning)</span> का एक संरचित रिकॉर्ड।</div>
                       <p class="lead">निर्णय लॉग बिल्कुल वैसा ही है जैसा यह लगता है। एक सरल प्रारूप जिसमें निर्णय, तर्क, अपेक्षित परिणाम, तिथि और वास्तविक परिणाम का विवरण होता है।</p>
                       <p class="lead">अधिकांश संस्थापकों का मानना है कि उन्हें याद रहेगा कि कुछ क्यों किया गया था। <b>उन्हें याद नहीं रहेगा।</b> तीन महीने बाद, संदर्भ गायब हो जाता है।</p>
                       <ul class="list">
                         <li>छूट की पेशकश की गई थी। क्यों?</li>
                         <li>एक आपूर्तिकर्ता बदल दिया गया। क्यों?</li>
                         <li>एक उत्पाद बंद कर दिया गया। क्यों?</li>
                       </ul>
                       <div class="quote">तर्क के बिना, आप सुधार नहीं कर सकते। इसके बजाय, आप दोहराते हैं। यही जाल है।</div>`
          }
        },
        {
          name: "COMPARISON", kicker: "Learning Cycle",
          title: { en: "Why Decision Logs Beat Raw Data", hi: "निर्णय लॉग कच्चे डेटा से बेहतर क्यों हैं" },
          html: {
            en: () => `<div class="big">Data alone doesn’t <span class="accent">teach.</span></div>
                       <p class="lead">Raw data tells you what happened: <i>Sales dropped 15%. Margin decreased 3%.</i></p>
                       <p class="lead">Decision logs tell you why it happened: <i>We reduced price by 10% due to competitor activity. Expected 20% volume increase. Actual was 8%. Conclusion: Price sensitivity lower than assumed.</i></p>
                       <p class="lead">This is the cheapest AI because it creates a learning cycle:</p>
                       <ul class="list">
                         <li><b>Input</b> (Reasoning)</li>
                         <li><b>Pattern recognition</b> (Observation)</li>
                         <li><b>Feedback</b> (Expectation vs. Result)</li>
                         <li><b>Refinement</b> (Adjustment)</li>
                       </ul>`,
            hi: () => `<div class="big">केवल डेटा <span class="accent">सिखाता</span> नहीं है।</div>
                       <p class="lead">कच्चा डेटा आपको बताता है कि क्या हुआ: <i>बिक्री 15% गिर गई। मार्जिन 3% कम हो गया।</i></p>
                       <p class="lead">निर्णय लॉग आपको बताते हैं कि ऐसा क्यों हुआ: <i>प्रतिस्पर्धी गतिविधि के कारण हमने कीमत 10% कम कर दी। 20% मात्रा वृद्धि की उम्मीद थी। वास्तविक 8% थी। निष्कर्ष: मूल्य संवेदनशीलता अनुमान से कम है।</i></p>
                       <p class="lead">यह सबसे सस्ता AI है क्योंकि यह एक सीखने का चक्र बनाता है:</p>
                       <ul class="list">
                         <li><b>इनपुट</b> (तर्क)</li>
                         <li><b>पैटर्न पहचान</b> (अवलोकन)</li>
                         <li><b>प्रतिक्रिया</b> (अपेक्षा बनाम परिणाम)</li>
                         <li><b>सुधार</b> (समायोजन)</li>
                       </ul>`
          }
        },
        {
          name: "EXAMPLES", kicker: "Practical Application",
          title: { en: "The Cost of Instinctive Decisions", hi: "स्वाभाविक निर्णयों की कीमत" },
          html: {
            en: () => `<div class="big">Discounting without <span class="accent">logs.</span></div>
                       <p class="lead">Month 1: Sales slow. Run 20% off. Revenue spikes, margin drops.<br>Month 2: Sales slow again. Run 20% off. Same result.<br>Month 3: No discount. Revenue flat.</p>
                       <ul class="list">
                         <li>Was the spike from new customers?</li>
                         <li>Did repeat purchase increase?</li>
                         <li>Did brand perception shift?</li>
                       </ul>

          wrapper.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1 target-title">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody target-body">
                ${htmlContent}
              </div>
            </article>
            <div class="hint">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrapper);
        });

        document.querySelectorAll('.section-wrapper').forEach(wrapper => observer.observe(wrapper));
      }

      const observerOptions = { root: container, threshold: 0.6 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-active');
            const index = parseInt(entry.target.getAttribute('data-index'));
            secLabel.textContent = `SEC ${index + 1}/${SECTIONS.length}`;
            secName.textContent = entry.target.getAttribute('data-name');
          } else {
            entry.target.classList.remove('is-active');
          }
        });
      }, observerOptions);

      const btnTranslate = document.getElementById('btnTranslate');
      const toast = document.getElementById('translationToast');
      const btnUndo = document.getElementById('btnUndoTranslate');
      const toastMsg = document.getElementById('toastMsg');
      let toastTimer;

      function triggerTranslation(lang) {
        currentLang = lang;
        renderSections();

        toast.classList.add('is-visible');
        if(lang === 'hi') {
          toastMsg.textContent = "Translated to Hindi";
          btnUndo.style.display = 'block';
        } else {
          toastMsg.textContent = "Reverted to English";
          btnUndo.style.display = 'none';
        }
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.classList.remove('is-visible'); }, 4000);
      }

      btnTranslate.addEventListener('click', () => { if (currentLang === 'en') triggerTranslation('hi'); });
      btnUndo.addEventListener('click', () => { triggerTranslation('en'); });

      window.generateBlogPrompt = function() {
        const niche = document.getElementById('ws-niche').value || 'Business';
        const goal = document.getElementById('ws-goal').value;
        const idea = document.getElementById('ws-idea').value;
        if(!idea.trim()) return alert("Please enter a Core Idea!");

        const promptText = `SYSTEM: You are an expert copywriter compiling a blog brief.
TARGET:
- Niche: ${niche.toUpperCase()}
- Primary Goal: ${goal.toUpperCase()}

CORE IDEA / BRIEF:
${idea}

OUTPUT REQUIREMENTS:
1. Provide a high-converting Hook (Pattern Interrupt).
2. Outline 3 core structural points (Body).
3. Conclude with a strong Call-To-Action (CTA).`;

        const previewBox = document.getElementById('ws-preview');
        previewBox.textContent = promptText;
        previewBox.style.display = 'block';
        document.getElementById('btnSubmitReview').style.display = 'flex';
      };

      window.submitForReview = function() {
        alert(currentLang === 'hi' ? "आपका ड्राफ्ट समीक्षा के लिए सबमिट कर दिया गया है!" : "Draft submitted for review!");
        renderSections();
      };

      renderSections();

      const popup = document.getElementById('rotatePopup');
      const appWrapper = document.getElementById('appWrapper');
      let isForcedLandscape = false; let targetRotationAngle = 0;

      window.addEventListener('deviceorientation', (e) => {
        const gamma = e.gamma;
        if (gamma === null || typeof gamma === 'undefined') return;
        const rotationThreshold = 45; const deadband = 25;

        if (!isForcedLandscape) {
          if (gamma > rotationThreshold) showRotatePopup(90);
          else if (gamma < -rotationThreshold) showRotatePopup(-90);
          else hideRotatePopup();
        } else {
          if (Math.abs(gamma) < deadband) showRotatePopup(0);
          else hideRotatePopup();
        }
      });

      function showRotatePopup(angle) {
        targetRotationAngle = angle; popup.classList.add('is-visible');
        if (angle === 0) {
          popup.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 2v20M17 7l-5-5-5 5M17 17l-5 5-5-5"/></svg> Tap for Portrait`;
        } else {
          popup.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"/><path d="M12 12h.01"/></svg> Tap for Landscape`;
        }
      }
      function hideRotatePopup() { popup.classList.remove('is-visible'); }

      popup.addEventListener('click', () => {
        if (targetRotationAngle !== 0) {
          appWrapper.classList.add('forced-landscape');
          appWrapper.style.transform = `rotate(${targetRotationAngle}deg)`;
          isForcedLandscape = true;
        } else {
          appWrapper.classList.remove('forced-landscape');
          appWrapper.style.transform = `none`;
          isForcedLandscape = false;
        }
        hideRotatePopup();
      });

    })();
  </script>
<script src="/vd-nav-fix.js" defer></script>
</main>
</body>
</html>
